<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a55f5"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="42" fill="#e8e9f3" font-size="28" font-weight="700" text-anchor="middle">RecruitGPT X — System Architecture</text>
  <text x="600" y="68" fill="#9ca0b3" font-size="14" text-anchor="middle">7-Agent LangGraph Pipeline · Semantic Ranking · Explainable AI</text>

  <!-- Frontend -->
  <rect x="80" y="100" width="1040" height="88" rx="12" fill="#1e2235" stroke="#4a55f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="128" fill="#22d3ee" font-size="13" font-weight="600">NEXT.JS 14 (Vercel)</text>
  <text x="100" y="152" fill="#c8cad6" font-size="12">Dashboard · Jobs · Candidates · Radar · Chat · What-If · Bias · Clerk Auth</text>
  <text x="100" y="172" fill="#9ca0b3" font-size="11">REST + SSE  ·  X-User-Id / JWT</text>

  <!-- Arrow -->
  <line x1="600" y1="188" x2="600" y2="218" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3ee"/></marker></defs>

  <!-- Backend -->
  <rect x="80" y="220" width="1040" height="280" rx="12" fill="#1e2235" stroke="#4a55f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="248" fill="#22d3ee" font-size="13" font-weight="600">FASTAPI BACKEND (Railway)</text>
  <text x="100" y="268" fill="#9ca0b3" font-size="11">Auth · Rate Limits · Owner-scoped IDOR protection · Prompt sanitization</text>

  <!-- Agents grid -->
  <rect x="100" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="112" y="314" fill="#fff" font-size="11" font-weight="600">1. Job Understanding</text><text x="112" y="332" fill="#9ca0b3" font-size="10">JD → Blueprint</text>
  <rect x="270" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="282" y="314" fill="#fff" font-size="11" font-weight="600">2. Candidate Intel</text><text x="282" y="332" fill="#9ca0b3" font-size="10">Resume + LinkedIn</text>
  <rect x="440" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="452" y="314" fill="#fff" font-size="11" font-weight="600">3. Behavioral</text><text x="452" y="332" fill="#9ca0b3" font-size="10">GitHub + Learning</text>
  <rect x="610" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="622" y="314" fill="#fff" font-size="11" font-weight="600">4. Trajectory</text><text x="622" y="332" fill="#9ca0b3" font-size="10">Career growth</text>
  <rect x="780" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="792" y="314" fill="#fff" font-size="11" font-weight="600">5. Semantic</text><text x="792" y="332" fill="#9ca0b3" font-size="10">BGE embeddings</text>
  <rect x="950" y="290" width="150" height="56" rx="8" fill="#2a2f45"/><text x="962" y="314" fill="#fff" font-size="11" font-weight="600">6. Ranking</text><text x="962" y="332" fill="#9ca0b3" font-size="10">30/20/15/15/10/10</text>

  <rect x="440" y="370" width="320" height="56" rx="8" fill="#2a2f45" stroke="#fbbf24" stroke-width="1"/>
  <text x="452" y="394" fill="#fbbf24" font-size="11" font-weight="600">7. Explainability + AI Recruiter Chat</text>
  <text x="452" y="412" fill="#9ca0b3" font-size="10">Personalized narratives · Comparison Q&amp;A</text>

  <text x="100" y="460" fill="#c8cad6" font-size="11">LangGraph orchestrator · asyncio.gather parallelism · NVIDIA NIM / MiniMax / Mock fallback</text>

  <!-- Data layer -->
  <rect x="120" y="530" width="220" height="72" rx="10" fill="#252a3d" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="558" fill="#10b981" font-size="12" font-weight="600">PostgreSQL</text>
  <text x="140" y="578" fill="#9ca0b3" font-size="10">Jobs · Candidates · Rankings</text>
  <text x="140" y="594" fill="#9ca0b3" font-size="10">owner_id multi-tenancy</text>

  <rect x="400" y="530" width="220" height="72" rx="10" fill="#252a3d" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="558" fill="#10b981" font-size="12" font-weight="600">Qdrant</text>
  <text x="420" y="578" fill="#9ca0b3" font-size="10">Vector search · UUID points</text>
  <text x="420" y="594" fill="#9ca0b3" font-size="10">NL candidate discovery</text>

  <rect x="680" y="530" width="220" height="72" rx="10" fill="#252a3d" stroke="#10b981" stroke-width="1"/>
  <text x="700" y="558" fill="#10b981" font-size="12" font-weight="600">BGE-Large</text>
  <text x="700" y="578" fill="#9ca0b3" font-size="10">1024-dim embeddings</text>
  <text x="700" y="594" fill="#9ca0b3" font-size="10">Semantic meaning match</text>

  <rect x="960" y="530" width="160" height="72" rx="10" fill="#252a3d" stroke="#10b981" stroke-width="1"/>
  <text x="980" y="558" fill="#10b981" font-size="12" font-weight="600">External APIs</text>
  <text x="980" y="578" fill="#9ca0b3" font-size="10">GitHub · LinkedIn OG</text>
  <text x="980" y="594" fill="#9ca0b3" font-size="10">NVIDIA NIM LLM</text>

  <line x1="230" y1="500" x2="230" y2="530" stroke="#4a55f5" stroke-width="1.5"/>
  <line x1="510" y1="500" x2="510" y2="530" stroke="#4a55f5" stroke-width="1.5"/>
  <line x1="790" y1="500" x2="790" y2="530" stroke="#4a55f5" stroke-width="1.5"/>
  <line x1="1040" y1="500" x2="1040" y2="530" stroke="#4a55f5" stroke-width="1.5"/>

  <text x="600" y="680" fill="#6b7280" font-size="11" text-anchor="middle">RecruitGPT X · Hackathon 2026 · docs/architecture-diagram.svg</text>
</svg>