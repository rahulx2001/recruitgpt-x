version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitgpt-postgres
    environment:
      POSTGRES_USER: recruitgpt
      POSTGRES_PASSWORD: recruitgpt
      POSTGRES_DB: recruitgpt
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: recruitgpt-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  qdrant_data:
