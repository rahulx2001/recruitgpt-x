  - "Grok"
  - "Cursor"

ai_usage_summary: |
  Used Grok and Cursor for architecture discussion, code review, and implementation
  assistance. No candidate records from candidates.jsonl were sent to any LLM during
  ranking. The offline ranker (rank.py) runs entirely locally with no network calls.

methodology_summary: |
  Hybrid offline ranker that mirrors how a senior recruiter shortlists for Redrob's
  Senior AI Engineer role. We parse the JD into weighted components: title/career
  alignment (32%), core AI/IR skills with endorsement-duration trust (28%), production
  deployment signals in summaries (18%), experience band 5–9 years (12%), and India
  location (10%). Redrob behavioral signals (response rate, GitHub, recruiter saves)
  apply as a bounded multiplier. Honeypot defense combines weak-title caps, noise-skill
  penalties (HTML/Tailwind stuffing), and explicit traps for unrelated titles with
  inflated AI skill counts. Tie-breaking uses raw score, core skill depth, and
  production signals — not candidate ID alone. Ranks 100K profiles in ~7s on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true  # verified via: python scripts/check_honeypots.py submission.csv
  reproduction_tested: true
