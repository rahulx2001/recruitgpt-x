ai_usage_summary: |
  Used Grok and Cursor for architecture discussion, code review, and implementation
  assistance. No candidate records from candidates.jsonl were sent to any LLM during
  ranking. The offline ranker (rank.py) runs entirely locally with no network calls.

methodology_summary: |
  Ranker v5: bi-encoder retrieval (precomputed MiniLM embeddings, graceful lexical fallback)
  → hybrid JD scorer (title/skills/production/availability/trap modifiers) → cross-encoder
  rerank on top-500 (ms-marco-MiniLM) → calibrated top-100. Resolves JD tensions: shipper over
  pure researcher, anti-keyword-stuffing, availability-weighted, anti-consulting, FAANG yellow-flag.
  Structural honeypot detection; CV/junior gate; IR-only assessments. ~48–120s rank on 100K CPU
  (embeddings loaded from artifact; no network). Eval: hand labels on sample + behavioral proxy
  (education tier, recruiter saves/views) — NOT hidden ground truth; expect composite ~0.60–0.68.

declarations:
  read_submission_spec: true
