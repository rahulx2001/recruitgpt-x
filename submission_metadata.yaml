ai_usage_summary: |
  Used Grok and Cursor for architecture discussion, code review, and implementation
  assistance. No candidate records from candidates.jsonl were sent to any LLM during
  ranking. The offline ranker (rank.py) runs entirely locally with no network calls.

methodology_summary: |
  Hybrid offline ranker mirroring a senior recruiter shortlisting for Redrob's founding
  Senior AI Engineer role. Weighted components: title/career alignment (30%), core
  AI/IR skills with endorsement-duration trust (27%), production deployment signals
  (17%), JD lexical overlap for retrieval/ranking mandate (6%), experience band 5–9y
  (11%), and India location with Pune/Noida boost (9%). Modifiers: product-company
  pedigree, notice-period, consulting penalty, framework-chaser demotion, behavioral
  signals (response rate, GitHub, recruiter saves), and honeypot traps for weak titles
  with inflated AI skill counts. Recommendation Systems and Search Engineer titles get
  explicit boosts per JD's ranking/retrieval ownership mandate. Tie-breaking: raw score,
  core skill depth, production, JD overlap, skills — not candidate ID alone. ~15s on
  100K CPU, zero network calls.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true  # verified via: python scripts/check_honeypots.py submission.csv
  reproduction_tested: true
