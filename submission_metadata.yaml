ai_tools_used:
  - "Grok"
  - "Cursor"

ai_usage_summary: |
  Used Grok and Cursor for architecture discussion, code review, and implementation
  assistance. No candidate records from candidates.jsonl were sent to any LLM during
  ranking. The offline ranker (rank.py) runs entirely locally with no network calls.

methodology_summary: |
  SUBMISSION PIPELINE (what produced submission.csv):
  Implemented components only — lexical/title scoring, TF-IDF JD overlap, committed
  MiniLM bi-encoder (embeddings.fp16.npz), honeypot detection, availability signals,
  title_heavy hybrid weights (title 0.24, skills 0.18), calibrated top-100.
  Cross-encoder: OFF (RANKER_USE_CROSS_ENCODER=0). No torch, no HF downloads at rank time.
  ~49s on 100K CPU, byte-reproducible via ./scripts/reproduce_ranking.sh.

  EXPERIMENTAL (NOT used in submission artifact):
  Optional cross-encoder rerank (RANKER_USE_CROSS_ENCODER=1) requires offline HF model
  cache and is disabled by default. Web UI uses a separate LangGraph demo ranker.

  EVALUATION (offline diagnostics, NOT hidden GT):
  Self-consistency proxy, behavioral proxy, and synthetic rule-based proxy labels
  (auto-generated by scripts/build_synthetic_proxy_labels.py — not human annotation;
  excludes submission top-100 to avoid self-grading).
  Embeddings: all-MiniLM-L6-v2@1110a243. Precompute is one-time, off-the-clock, network-allowed.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true