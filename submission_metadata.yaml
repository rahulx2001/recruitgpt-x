ai_usage_summary: |
  Used Grok and Cursor for architecture discussion, code review, and implementation
  assistance. No candidate records from candidates.jsonl were sent to any LLM during
  ranking. The offline ranker (rank.py) runs entirely locally with no network calls.

methodology_summary: |
  Ranker v4: trap-aware hybrid scorer with single-pass streaming heap (no second file read),
  per-candidate text index (tokenize once, reuse across scorers), and compute-once modifiers.
  Career semantic matching (TF-IDF + plain-language regex), IR-only skill_assessment_scores,
  and availability intelligence (open_to_work, last_active, response rate). Base weights:
  career semantic 15%, skills 16%, title 17%, production 11%, assessments 10%, availability
  10%, engagement 6%. Structural honeypot detection (expert@0mo, impossible tenure, skill
  stuffing). CV/speech disqualifier gate tightened for junior profiles. Core IR skills exclude
  generic python/tensorflow. Scores calibrated from real model output (~48s on 100K CPU, low
  RAM, zero network). Offline eval (scripts/run_eval.py) is a self-consistency proxy using
  an independent JD rubric — not challenge hidden ground truth; see data/eval_report.json.
  Weight ablation compares presets on that proxy only; we expect real composite ~0.60–0.68.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true  # structural honeypot_risk via scripts/check_honeypots.py
  reproduction_tested: true