# Offline ranker reproduction — hackathon compute constraints (CPU, no network)
services:
  ranker:
    build:
      context: .
      dockerfile: docker/Dockerfile.ranker
    image: recruitgpt-ranker:3.11
    network_mode: none
    environment:
      RANKER_USE_CROSS_ENCODER: "0"
      RANKER_REQUIRE_EMBEDDINGS: "1"
    volumes:
      - ./data/candidates.jsonl:/app/data/candidates.jsonl:ro
      - ./data/embeddings:/app/data/embeddings:ro
      - ./data/docker_repro:/app/docker_repro
    command: >
      python rank.py
      --candidates ./data/candidates.jsonl
      --out ./docker_repro/submission.csv