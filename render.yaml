# Backend only — frontend deploys to Appwrite Sites.
# After Appwrite deploy, add your site URL to CORS_ORIGINS below.

services:
  - type: web
    name: recruitgpt-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements-minimal.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: production
      - key: REQUIRE_AUTH
        value: "false"
      - key: AUTO_IMPORT_CHALLENGE_TOP100
        value: "true"
      - key: AUTO_SEED_ON_STARTUP
        value: "false"
      - key: USE_SEMANTIC_RANKING_WEIGHTS
        value: "false"
      - key: EMBEDDING_PROVIDER
        value: local
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./recruitgpt.db
      - key: DEFAULT_DEV_USER_ID
        value: dev-user
      - key: CORS_ORIGINS
        value: '["https://recruitgpt-x.vercel.app","http://localhost:3000"]'