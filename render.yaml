# Free-tier full stack on Render (no card required).
# Backend: recruitgpt-api  |  Frontend: recruitgpt-web

services:
  - type: web
    name: recruitgpt-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements-minimal.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: production
      - key: REQUIRE_AUTH
        value: "false"
      - key: AUTO_IMPORT_CHALLENGE_TOP100
        value: "true"
      - key: AUTO_SEED_ON_STARTUP
        value: "false"
      - key: USE_SEMANTIC_RANKING_WEIGHTS
        value: "false"
      - key: EMBEDDING_PROVIDER
        value: local
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./recruitgpt.db
      - key: DEFAULT_DEV_USER_ID
        value: dev-user
      - key: CORS_ORIGINS
        value: '["https://recruitgpt-web.onrender.com","https://recruitgpt-x.vercel.app","http://localhost:3000"]'

  - type: web
    name: recruitgpt-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NEXT_PUBLIC_API_URL
        value: https://recruitgpt-api.onrender.com
      - key: NEXT_PUBLIC_DEV_USER_ID
        value: dev-user